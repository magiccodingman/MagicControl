name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: MagicControl
        run: dotnet restore MagicControl.sln

      - name: Build
        working-directory: MagicControl
        run: dotnet build MagicControl.sln --configuration Release --no-restore

      - name: Test
        working-directory: MagicControl
        run: dotnet test MagicControl.sln --configuration Release --no-build --logger "console;verbosity=normal"
