name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: MagicControl
        run: dotnet restore MagicControl.sln

      - name: Build
        working-directory: MagicControl
        run: dotnet build MagicControl.sln --configuration Release --no-restore > build.log 2>&1

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: MagicControl/build.log
          if-no-files-found: error
          retention-days: 7

      - name: Test
        working-directory: MagicControl
        shell: bash
        run: |
          set -o pipefail
          dotnet test MagicControl.sln \
            --configuration Release \
            --no-build \
            --results-directory TestResults \
            --logger "trx;LogFileName=tests.trx" \
            --logger "console;verbosity=normal" \
            2>&1 | tee test.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            MagicControl/test.log
            MagicControl/TestResults/**/*.trx
          if-no-files-found: error
          retention-days: 7
