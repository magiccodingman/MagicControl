name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: MagicControl
        run: dotnet restore MagicControl.sln

      - name: Build
        working-directory: MagicControl
        run: dotnet build MagicControl.sln --configuration Release --no-restore > build.log 2>&1

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: MagicControl/build.log
          if-no-files-found: error
          retention-days: 7

      - name: Test
        working-directory: MagicControl
        run: dotnet test MagicControl.sln --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Pack MagicControl.Client
        working-directory: MagicControl
        run: >-
          dotnet pack MagicControl.sln
          --configuration Release
          --no-restore
          --output ../artifacts/ci-pack
          -p:PackageVersion=0.0.0-ci

      - name: Validate MagicControl.Client package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="artifacts/ci-pack"
          package="$package_dir/MagicControl.Client.0.0.0-ci.nupkg"
          symbols="$package_dir/MagicControl.Client.0.0.0-ci.snupkg"

          test -f "$package"
          test -f "$symbols"

          package_count=$(find "$package_dir" -maxdepth 1 -name '*.nupkg' | wc -l)
          if [[ "$package_count" -ne 1 ]]; then
            echo "Expected exactly one .nupkg file, found $package_count."
            find "$package_dir" -maxdepth 1 -type f -print
            exit 1
          fi

          unzip -l "$package" | grep -q 'lib/net10.0/MagicControl.Shared.dll'
          unzip -l "$package" | grep -q '128x128_compressed.png'
          unzip -l "$package" | grep -q 'README.md'
